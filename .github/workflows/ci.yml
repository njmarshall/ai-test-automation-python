name: CI — Healthcare FHIR Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  #  API Tests — Patient, Encounter, Observation                        #
  # ------------------------------------------------------------------ #
  api-tests:
    name: FHIR API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FHIR API tests
        run: |
          pytest projects/healthcare_fhir/api/tests/ \
            -v \
            -m healthcare \
            --tb=short \
            --no-header

  # ------------------------------------------------------------------ #
  #  UI Tests — Playwright HAPI FHIR explorer                          #
  # ------------------------------------------------------------------ #
  ui-tests:
    name: FHIR UI Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run FHIR UI tests
        run: |
          pytest projects/healthcare_fhir/ui/tests/ \
            -v \
            -m ui \
            --tb=short \
            --no-header

  # ------------------------------------------------------------------ #
  #  PetStore API Tests                                                 #
  # ------------------------------------------------------------------ #
  petstore-tests:
    name: PetStore API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PetStore API tests
        run: |
          pytest projects/petstore/api/tests/ \
            -v \
            -m petstore \
            --tb=short \
            --no-header
